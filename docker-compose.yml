services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator-local
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [control]
  api:
    build: { context: ., dockerfile: backend/Dockerfile }
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      MODEL_PROVIDER: lm-studio
      LM_STUDIO_BASE_URL: ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LM_STUDIO_API_KEY: ${LM_STUDIO_API_KEY:-lm-studio}
      LM_STUDIO_MODEL_ID: ${LM_STUDIO_MODEL_ID:-qwen3.6-27b}
      PROJECT_ROOTS: /projects
      ORCHESTRATOR_CONFIG_ROOT: /app/config
    volumes:
      - ./projects:/projects:ro
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
    extra_hosts: ["host.docker.internal:host-gateway"]
    read_only: true
    tmpfs: [/tmp]
    networks: [control]
  web:
    build: { context: ./frontend, dockerfile: Dockerfile }
    ports: ["3000:80"]
    depends_on:
      api: { condition: service_started }
    networks: [control]
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    networks: [control, observability]
  tempo:
    image: grafana/tempo:2.7.2
    networks: [observability]
  loki:
    image: grafana/loki:3.4.2
    networks: [observability]
  prometheus:
    image: prom/prometheus:v3.2.1
    networks: [observability]
  grafana:
    image: grafana/grafana:11.5.2
    ports: ["3001:3000"]
    depends_on: [tempo, loki, prometheus]
    volumes: [grafana-data:/var/lib/grafana]
    networks: [observability]
networks:
  control: {}
  observability:
    internal: true
volumes:
  postgres-data: {}
  grafana-data: {}
